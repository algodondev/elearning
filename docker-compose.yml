services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elearning-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api/v1
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-elearning}
      DB_USER: ${DB_USER:-elearning}
      DB_PASSWORD: ${DB_PASSWORD:-elearning_dev_password}
      DB_LOGGING: ${DB_LOGGING:-false}
      JWT_SECRET: ${JWT_SECRET:-docker-development-secret-change-before-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      THROTTLE_TTL_MS: ${THROTTLE_TTL_MS:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
      ALERT_CRON: ${ALERT_CRON:-0 0 2 * * *}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${PORT:-3000}:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:17-alpine
    container_name: elearning-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-elearning}
      POSTGRES_USER: ${DB_USER:-elearning}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-elearning_dev_password}
    ports:
      - '${DB_PORT:-5433}:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-elearning} -d ${DB_NAME:-elearning}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - elearning-postgres-data:/var/lib/postgresql/data

volumes:
  elearning-postgres-data:

networks:
  default:
    name: elearning-network
